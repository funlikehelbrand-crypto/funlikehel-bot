services:
  - type: web
    name: funlikehel-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_PAGE_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: SERWERSMS_TOKEN
        sync: false
      - key: SERWERSMS_SENDER
        value: FUNlikeHEL
